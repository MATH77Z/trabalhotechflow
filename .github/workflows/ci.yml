name: Python CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install pytest
    - run: |
        mkdir -p src/tests
        echo "import pytest" > src/tests/test_manager.py
        pytest --maxfail=1 --disable-warnings || true
